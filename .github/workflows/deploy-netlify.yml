name: Deploy Frontend to Netlify

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create ZIP of frontend
        run: |
          cd frontend
          zip -r ../frontend-deploy.zip .

      - name: Deploy to Netlify via API
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "$NETLIFY_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "Missing NETLIFY_AUTH_TOKEN or NETLIFY_SITE_ID secrets"; exit 1
          fi
          echo "Deploying frontend to Netlify site $NETLIFY_SITE_ID"
          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" -X POST "https://api.netlify.com/api/v1/sites/${NETLIFY_SITE_ID}/deploys" \
            -H "Authorization: Bearer ${NETLIFY_TOKEN}" \
            -F "file=@frontend-deploy.zip")
          echo "Netlify response HTTP code: $HTTP_CODE"
          cat response.json
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "Netlify deploy failed"; exit 1
          fi
