<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>CareerLens AI Auth</title>

    <style>

        body {

            margin: 0;

            font-family: Arial;

            background: linear-gradient(
                135deg,
                #667eea,
                #764ba2
            );

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;
        }

        .container {

            background: white;

            width: 350px;

            padding: 40px;

            border-radius: 20px;

            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);

            text-align: center;
        }

        h1 {

            color: #333;
        }

        input {

            width: 90%;

            padding: 12px;

            margin-top: 15px;

            border-radius: 10px;

            border: 1px solid #ccc;
        }

        button {

            width: 100%;

            padding: 12px;

            margin-top: 20px;

            border: none;

            border-radius: 10px;

            background: #667eea;

            color: white;

            font-size: 16px;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {

            background: #5a67d8;
        }

        #message {

            margin-top: 20px;

            color: green;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>CareerLens AI 🔐</h1>

        <input
            type="text"
            id="username"
            placeholder="Username"
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
        >

        <button onclick="register()">
            Register
        </button>

        <button onclick="login()">
            Login
        </button>

        <p id="message"></p>

    </div>

    <script>

        async function register() {

            let username =
                document.getElementById(
                    "username"
                ).value;

            let password =
                document.getElementById(
                    "password"
                ).value;

            let response = await fetch(
                "http://127.0.0.1:5000/register",
                {

                    method: "POST",

                    headers: {
                        "Content-Type":
                        "application/json"
                    },

                    body: JSON.stringify({

                        username: username,

                        password: password
                    })
                }
            );

            let data = await response.json();

            document.getElementById(
                "message"
            ).innerText = data.message;
        }


        async function login() {

            let username =
                document.getElementById(
                    "username"
                ).value;

            let password =
                document.getElementById(
                    "password"
                ).value;

            let response = await fetch(
                "http://127.0.0.1:5000/login",
                {

                    method: "POST",

                    headers: {
                        "Content-Type":
                        "application/json"
                    },

                    body: JSON.stringify({

                        username: username,

                        password: password
                    })
                }
            );

            let data = await response.json();

            document.getElementById(
                "message"
            ).innerText = data.message;

            if (data.message ===
                "Login successful") {

                window.location.href =
                    "index.html";
            }
        }

    </script>

</body>

</html>
