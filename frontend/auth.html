<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerLens AI - Auth Hub</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b111e;
            --card-bg: rgba(22, 30, 49, 0.7);
            --primary: #00f2fe;
            --primary-glow: rgba(0, 242, 254, 0.4);
            --secondary: #7c3aed;
            --secondary-glow: rgba(124, 58, 237, 0.4);
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% 50%, #151e33 0%, var(--bg-color) 80%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Abstract decorative glowing Orbs */
        .orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.15;
            pointer-events: none;
        }
        .orb-left {
            background: var(--primary);
            top: -50px;
            left: -50px;
            animation: float-left 20s infinite ease-in-out;
        }
        .orb-right {
            background: var(--secondary);
            bottom: -50px;
            right: -50px;
            animation: float-right 20s infinite ease-in-out;
        }

        @keyframes float-left {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(40px, 30px); }
        }
        @keyframes float-right {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-40px, -30px); }
        }

        .auth-container {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            text-align: center;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .logo-section p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(10, 15, 25, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-color);
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            background: rgba(10, 15, 25, 0.7);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #00c6ff 100%);
            color: #020617;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.6);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary);
        }

        #message {
            margin-top: 20px;
            font-size: 14px;
            font-weight: 600;
            min-height: 20px;
        }

        .message-success {
            color: #10b981;
        }

        .message-error {
            color: #f43f5e;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 12px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider:not(:empty)::before {
            margin-right: .5em;
        }

        .divider:not(:empty)::after {
            margin-left: .5em;
        }
    </style>
</head>
<body>
    <div class="orb orb-left"></div>
    <div class="orb orb-right"></div>

    <div class="auth-container">
        <div class="logo-section">
            <h1>CareerLens AI</h1>
            <p>Elevate your resume. Crack your dream career.</p>
        </div>

        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>

        <button class="btn btn-primary" onclick="login()">Log In</button>
        
        <div class="divider">or</div>

        <button class="btn btn-secondary" onclick="register()">Create Account</button>

        <p id="message"></p>
    </div>

    <script>
        function showMessage(text, isError = false) {
            const msgEl = document.getElementById("message");
            msgEl.innerText = text;
            msgEl.className = isError ? "message-error" : "message-success";
        }

        async function register() {
            let username = document.getElementById("username").value.trim();
            let password = document.getElementById("password").value;

            if (!username || !password) {
                showMessage("Please fill in all fields.", true);
                return;
            }

            try {
                let response = await fetch("/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                let data = await response.json();
                if (response.ok) {
                    showMessage("Registration successful! Logging in...", false);
                    localStorage.setItem("username", username);
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1500);
                } else {
                    showMessage(data.message || "Registration failed.", true);
                }
            } catch (err) {
                console.error(err);
                showMessage("Connection error. Is backend running?", true);
            }
        }

        async function login() {
            let username = document.getElementById("username").value.trim();
            let password = document.getElementById("password").value;

            if (!username || !password) {
                showMessage("Please fill in all fields.", true);
                return;
            }

            try {
                let response = await fetch("/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                let data = await response.json();
                if (response.ok) {
                    showMessage("Login successful! Redirecting...", false);
                    localStorage.setItem("username", data.username || username);
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1000);
                } else {
                    showMessage(data.message || "Invalid username or password.", true);
                }
            } catch (err) {
                console.error(err);
                showMessage("Connection error. Is backend running?", true);
            }
        }

        // Allow hitting Enter to submit
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    login();
                }
            });
        });

        // Clear local storage on load to prevent state leaks
        localStorage.removeItem("username");
    </script>
</body>
</html>
