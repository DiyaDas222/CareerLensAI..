<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>CareerLens AI</title>

<style>

body {

    margin: 0;

    font-family: Arial;

    background: linear-gradient(
        135deg,
        #667eea,
        #764ba2
    );

    color: white;

    min-height: 100vh;

    display: flex;

    justify-content: center;

    align-items: center;
}

.container {

    width: 90%;

    max-width: 700px;

    background: rgba(255,255,255,0.1);

    padding: 40px;

    border-radius: 20px;

    backdrop-filter: blur(10px);

    box-shadow: 0 8px 32px rgba(0,0,0,0.2);

    text-align: center;
}

h1 {

    font-size: 40px;

    margin-bottom: 10px;
}

p {

    opacity: 0.9;
}

input {

    width: 90%;

    padding: 14px;

    margin-top: 15px;

    border: none;

    border-radius: 10px;

    outline: none;
}

button {

    margin-top: 20px;

    padding: 14px 25px;

    border: none;

    border-radius: 10px;

    background: #ffffff;

    color: #333;

    font-size: 16px;

    cursor: pointer;

    transition: 0.3s;
}

button:hover {

    transform: scale(1.05);
}

.card {

    margin-top: 30px;

    background: rgba(255,255,255,0.15);

    padding: 20px;

    border-radius: 15px;

    text-align: left;
}

.dark-mode {

    background: linear-gradient(
        135deg,
        #141e30,
        #243b55
    );
}

.toggle {

    position: absolute;

    top: 20px;

    right: 20px;
}

</style>

</head>

<body>

<button class="toggle"
onclick="toggleDarkMode()">
🌙 Dark Mode
</button>

<div class="container">

<h1>CareerLens AI 🚀</h1>

<p>
AI Powered Resume Analyzer
</p>

<input
type="file"
id="resumeFile"
>

<br>

<button onclick="uploadResume()">
Analyze Resume
</button>

<button onclick="downloadReport()">
Download PDF Report
</button>

<div
id="result"
class="card"
style="display:none;"
>

<h2>Analysis Result</h2>

<p id="score"></p>

<p id="level"></p>

<p id="skills"></p>

<p id="suggestions"></p>

</div>

</div>

<script>

function toggleDarkMode() {

    document.body.classList.toggle(
        "dark-mode"
    );
}

async function uploadResume() {

    let fileInput =
        document.getElementById(
            "resumeFile"
        );

    let file = fileInput.files[0];

    if (!file) {

        alert("Please upload a file");

        return;
    }

    let formData = new FormData();

    formData.append("resume", file);

    let response = await fetch(

        "http://127.0.0.1:5000/upload",

        {

            method: "POST",

            body: formData
        }
    );

    let data = await response.json();

    document.getElementById(
        "result"
    ).style.display = "block";

    document.getElementById(
        "score"
    ).innerHTML =
        "<b>Score:</b> " + data.score;

    document.getElementById(
        "level"
    ).innerHTML =
        "<b>Level:</b> " + data.level;

    document.getElementById(
        "skills"
    ).innerHTML =
        "<b>Skills:</b> " +
        data.skills_found.join(", ");

    document.getElementById(
        "suggestions"
    ).innerHTML =
        "<b>Suggestions:</b> " +
        data.suggestions.join(", ");
}

function downloadReport() {

    window.open(
        "http://127.0.0.1:5000/download-report"
    );
}

</script>

</body>

</html>
